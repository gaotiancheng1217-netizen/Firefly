name: Deploy to Tencent Cloud

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Pack dist
        run: tar -czf firefly-dist.tar.gz -C dist .

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: firefly-dist.tar.gz
          target: /tmp

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            WEB_DIR="/var/www/firefly"
            PACKAGE="/tmp/firefly-dist.tar.gz"
            RELEASE_DIR="/tmp/firefly-release"

            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$PACKAGE" -C "$RELEASE_DIR"

            sudo mkdir -p "$WEB_DIR"
            sudo rm -rf "$WEB_DIR"/*
            sudo cp -r "$RELEASE_DIR"/. "$WEB_DIR"/

            sudo find "$WEB_DIR" -type d -exec chmod 755 {} \;
            sudo find "$WEB_DIR" -type f -exec chmod 644 {} \;

            sudo nginx -t
            sudo systemctl reload nginx
            curl -I https://tiancheng-blog.com

            rm -rf "$RELEASE_DIR" "$PACKAGE"
