<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="620" rx="36" fill="#F7F7FF"/>
  <rect x="56" y="48" width="1168" height="524" rx="30" fill="white" stroke="#E5E7F6" stroke-width="2"/>
  <text x="92" y="108" fill="#111827" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">项目目录与模块分工</text>
  <text x="92" y="148" fill="#6B7280" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">不同目录分别承载巡检、分析、报告、契约、测试和容器化运行能力</text>

  <g font-family="Segoe UI, Microsoft YaHei, sans-serif">
    <rect x="92" y="200" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="124" y="233" fill="#111827" font-size="22" font-weight="700">scripts/</text>
    <text x="124" y="260" fill="#6B7280" font-size="16">Shell 健康检查与 Nginx 日志分析</text>

    <rect x="480" y="200" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="512" y="233" fill="#111827" font-size="22" font-weight="700">src/</text>
    <text x="512" y="260" fill="#6B7280" font-size="16">Python 报告、异常提取、AI 分析</text>

    <rect x="868" y="200" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="900" y="233" fill="#111827" font-size="22" font-weight="700">tests/</text>
    <text x="900" y="260" fill="#6B7280" font-size="16">固定样本、单元测试、离线验证</text>

    <rect x="92" y="326" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="124" y="359" fill="#111827" font-size="22" font-weight="700">config/</text>
    <text x="124" y="386" fill="#6B7280" font-size="16">crontab 示例与 AI 响应 Schema</text>

    <rect x="480" y="326" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="512" y="359" fill="#111827" font-size="22" font-weight="700">prompts/</text>
    <text x="512" y="386" fill="#6B7280" font-size="16">AI 分析提示词与安全边界</text>

    <rect x="868" y="326" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="900" y="359" fill="#111827" font-size="22" font-weight="700">Dockerfile / compose.yaml</text>
    <text x="900" y="386" fill="#6B7280" font-size="16">容器化报告生成器运行环境</text>

    <rect x="286" y="452" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="318" y="485" fill="#111827" font-size="22" font-weight="700">logs/</text>
    <text x="318" y="512" fill="#6B7280" font-size="16">本地运行日志，不提交真实数据</text>

    <rect x="674" y="452" width="320" height="78" rx="18" fill="#EEF0FF"/>
    <text x="706" y="485" fill="#111827" font-size="22" font-weight="700">reports/</text>
    <text x="706" y="512" fill="#6B7280" font-size="16">日报、异常 JSON、AI 分析报告</text>
  </g>
</svg>
