<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="520" rx="36" fill="#F6F7FF"/>
  <rect x="52" y="50" width="1176" height="420" rx="30" fill="white" stroke="#E6E8F7" stroke-width="2"/>
  <text x="84" y="108" fill="#111827" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">ServerSentinel 整体处理流程</text>
  <text x="84" y="148" fill="#6B7280" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">从服务器巡检到结构化异常，再到 AI 辅助分析报告</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#8B8CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#8B8CF6" flood-opacity="0.13"/>
    </filter>
  </defs>

  <g font-family="Segoe UI, Microsoft YaHei, sans-serif" filter="url(#shadow)">
    <rect x="82" y="220" width="160" height="106" rx="22" fill="#EEF0FF"/>
    <text x="162" y="263" text-anchor="middle" fill="#111827" font-size="22" font-weight="700">Shell 巡检</text>
    <text x="162" y="294" text-anchor="middle" fill="#6B7280" font-size="16">HTTP / Nginx / 资源</text>

    <rect x="300" y="220" width="160" height="106" rx="22" fill="#EEF0FF"/>
    <text x="380" y="263" text-anchor="middle" fill="#111827" font-size="22" font-weight="700">巡检日志</text>
    <text x="380" y="294" text-anchor="middle" fill="#6B7280" font-size="16">OK / WARNING / ERROR</text>

    <rect x="518" y="220" width="160" height="106" rx="22" fill="#EEF0FF"/>
    <text x="598" y="263" text-anchor="middle" fill="#111827" font-size="22" font-weight="700">Python 日报</text>
    <text x="598" y="294" text-anchor="middle" fill="#6B7280" font-size="16">Markdown 报告</text>

    <rect x="736" y="220" width="160" height="106" rx="22" fill="#EEF0FF"/>
    <text x="816" y="263" text-anchor="middle" fill="#111827" font-size="22" font-weight="700">异常 JSON</text>
    <text x="816" y="294" text-anchor="middle" fill="#6B7280" font-size="16">分类 / 摘要 / 证据</text>

    <rect x="954" y="220" width="160" height="106" rx="22" fill="#EEF0FF"/>
    <text x="1034" y="263" text-anchor="middle" fill="#111827" font-size="22" font-weight="700">DeepSeek</text>
    <text x="1034" y="294" text-anchor="middle" fill="#6B7280" font-size="16">结构化分析</text>
  </g>

  <g stroke="#8B8CF6" stroke-width="4" marker-end="url(#arrow)" stroke-linecap="round">
    <line x1="252" y1="273" x2="290" y2="273"/>
    <line x1="470" y1="273" x2="508" y2="273"/>
    <line x1="688" y1="273" x2="726" y2="273"/>
    <line x1="906" y1="273" x2="944" y2="273"/>
  </g>

  <rect x="444" y="372" width="392" height="56" rx="18" fill="#F1F1FF"/>
  <text x="640" y="407" text-anchor="middle" fill="#5850EC" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="20" font-weight="700">GitHub Actions 自动验证 Shell / Python / Docker / AI 模块</text>
